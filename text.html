<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<title>Български TTS – Чети на глас</title>
<script src="js/tts.js" defer></script>
<link rel="stylesheet" href="style.css">
<style>
/* BODY - започва отгоре, не центрира вертикално */
body {
    background: #0E067D;
    min-height: 100vh;
    display: flex;
    justify-content: center; /* хоризонтално центриране */
    align-items: flex-start; /* започва отгоре */
    padding: 20px 0;
    margin: 0;
}

/* CONTAINER */
.container {
    background: #ffffff;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    margin-top: 20px; /* еднакво начало за всички страници */
}

/* HEADINGS */
h2 {
    color: #0E067D;
    margin-bottom: 16px;
    font-size: 1.8rem;
}

/* NAVIGATION */
.nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    min-height: 50px;
}

.nav .btn {
    background: #0E067D;
    color: white;
    padding: 8px 18px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 1rem;
    white-space: nowrap;
    transition: 0.2s;
}

.nav .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 120px;
    font-size: 16px;
    padding: 14px;
    margin-bottom: 16px;
    border-radius: 15px;
    border: 2px solid #d0e6ff;
    resize: none;
    outline: none;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.08);
    background: #ffffff;
    transition: all 0.3s ease;
}

textarea:focus {
    border-color: #7eaaf2;
    box-shadow: 0 0 0 3px rgba(126,170,242,0.3);
}

/* BUTTON */
button {
    width: 100%;
    background: #0E067D;
    color: white;
    font-size: 16px;
    padding: 12px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-bottom: 20px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

button:active {
    transform: scale(0.97);
}

/* MOBILE */
@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 16px;
    }

    h2 {
        font-size: 1.4rem;
    }

    textarea {
        height: 100px;
        font-size: 14px;
    }

    button {
        font-size: 14px;
        padding: 10px;
    }

    .nav .btn {
        font-size: 13px;
        padding: 6px 12px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h2>Текст → Говор</h2>
	<div class="nav">
        <a href="index.html" class="btn">Начало</a>
        <a href="images.html" class="btn">Картинки</a>
		<a href="alphabet.html" class="btn">Азбука</a>
		<a href="about.html" class="btn">За проекта</a>
    </div>
    <textarea id="text">Здравей! Това е тест на български.</textarea>
    <button onclick="speak()">Чети на глас</button>

    <audio id="audio" hidden></audio>
</div>

<script>
function speak() {
    const text = document.getElementById("text").value.trim();
    if (!text) return;

    const url = "https://translate.google.com/translate_tts?ie=UTF-8&tl=bg&client=tw-ob&q=" 
                + encodeURIComponent(text);

    const audio = document.getElementById("audio");
    audio.src = url;
    audio.play();
}
</script>

</body>
</html>
