<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyTalk - Азбука</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Азбука</h1>

    <div class="controls">
        <button onclick="speakAlphabet()">🔊 Произнеси цялата азбука</button>
        <button onclick="stopSpeaking()">⛔ Стоп</button>
        <button onclick="toggleSlowMode()">👶 Детски режим</button>
        <button onclick="toggleDarkMode()">🌙 Тъмен режим</button>
    </div>

    <p>Натисни буква, за да бъде произнесена</p>

    <div class="grid" id="grid"></div>
</div>

<script>
const letters = [
"а","б","в","г","д","е","ж","з","и","й",
"к","л","м","н","о","п","р","с","т","у",
"ф","х","ц","ч","ш","щ","ъ","ь","ю","я"
];

let slowMode = false;
let selectedVoice = null;

// Зареждане на гласовете
function initVoices(callback) {
    let voices = speechSynthesis.getVoices();

    if (!voices.length) {
        speechSynthesis.onvoiceschanged = () => initVoices(callback);
        return;
    }

    selectedVoice =
        voices.find(v => v.lang === "bg-BG") ||
        voices.find(v => v.lang.startsWith("bg")) ||
        voices[0];

    if (!selectedVoice) alert("Няма български глас, ще се използва друг наличен глас.");

    if (callback) callback();
}
initVoices();

// Произнасяне на текст
function speak(text) {
    if (!selectedVoice) {
        initVoices(() => speak(text));
        return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = selectedVoice;
    utter.rate = slowMode ? 0.7 : 0.9;
    utter.pitch = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
}

// Произнасяне на цялата азбука
function speakAlphabet() {
    if (!selectedVoice) {
        initVoices(speakAlphabet);
        return;
    }
    speechSynthesis.cancel();
    letters.forEach((letter, index) => {
        setTimeout(() => {
            const utter = new SpeechSynthesisUtterance(letter);
            utter.voice = selectedVoice;
            utter.rate = slowMode ? 0.7 : 0.9;
            utter.pitch = 1;
            speechSynthesis.speak(utter);
        }, index * 600);
    });
}

// Стоп
function stopSpeaking() {
    speechSynthesis.cancel();
}

// Детски режим
function toggleSlowMode() {
    slowMode = !slowMode;
    alert(slowMode ? "Детски режим включен" : "Детски режим изключен");
}

// Тъмен режим
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

// Генериране на буквите
const grid = document.getElementById("grid");
letters.forEach((letter, index) => {
    const card = document.createElement("div");
    card.className = "image-card";
    card.innerHTML = `
        <img src="alphabet/${index+1}_${getFileName(letter)}.png" alt="${letter}">
        <span>${letter}</span>
    `;
    card.onclick = () => speak(letter);
    grid.appendChild(card);
});

// Файлове
function getFileName(letter) {
    const map = {
        "а":"a","б":"b","в":"v","г":"g","д":"d","е":"e","ж":"j","з":"z","и":"i",
        "й":"ikratko","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r",
        "с":"s","т":"t","у":"u","ф":"f","х":"h","ц":"c","ч":"ch","ш":"sh",
        "щ":"sht","ъ":"y","ь":"er_malyk","ю":"iu","я":"q"
    };
    return map[letter];
}
</script>

</body>
</html>
